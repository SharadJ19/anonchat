<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anonymous Chat & Poll App</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100 flex items-center justify-center min-h-screen p-4">

    <div class="w-full max-w-5xl bg-white shadow-lg rounded-lg flex flex-col md:flex-row overflow-hidden">
        
        <!-- Left Pane (Chat Section) -->
        <div class="w-full md:w-1/2 p-6 bg-blue-50 flex flex-col">
            <h2 class="text-2xl font-bold text-blue-600 mb-4">Anonymous Chat</h2>
            
            <!-- Active Users Display -->
            <div class="flex items-center space-x-2 mb-4">
                <img src="./green-icon.png" alt="User Icon" class="w-5 h-5">
                <span id="active-users-count" class="text-blue-700 font-semibold">0</span>
                <span class="text-gray-700">Online</span>
            </div>

            <!-- Chat Window -->
            <div id="chat-window" class="flex-1 overflow-y-auto bg-white p-3 border border-gray-300 rounded-lg h-64 md:h-80">
                <ul id="messages" class="space-y-1 text-gray-700"></ul>
            </div>

            <!-- Chat Input -->
            <div class="mt-4 flex space-x-2">
                <input type="text" id="message-input" placeholder="Type a message..." class="flex-1 p-2 border border-gray-300 rounded-lg focus:outline-none focus:ring-2 focus:ring-blue-400">
                <button id="send-btn" class="bg-blue-500 text-white px-4 py-2 rounded-lg hover:bg-blue-700 transition">Send</button>
            </div>
        </div>

        <!-- Right Pane (Poll Section) -->
        <div class="w-full md:w-1/2 p-6 bg-white flex flex-col">
            <h3 class="text-2xl font-bold text-blue-600 mb-4">Create a Poll</h3>
            
            <input type="text" id="poll-question" placeholder="Poll question" class="w-full p-2 border border-gray-300 rounded-lg mb-2 focus:outline-none focus:ring-2 focus:ring-green-400">
            <input type="text" id="poll-option" placeholder="Options (comma separated)" class="w-full p-2 border border-gray-300 rounded-lg mb-2 focus:outline-none focus:ring-2 focus:ring-green-400">
            <button id="create-poll-btn" class="w-full bg-green-500 text-white px-4 py-2 rounded-lg hover:bg-green-700 transition">Create Poll</button>

            <h3 class="text-xl font-semibold text-blue-600 mt-6">Active Polls</h3>
            <div id="polls" class="mt-4 space-y-4 overflow-y-auto flex-1 h-64 md:h-80"></div>
        </div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="script.js"></script>
</body>
</html>
